name: Build Android APK

on:
  push:
    branches: [main, master]
  workflow_dispatch:

jobs:
  build:
    name: Compilar APK
    runs-on: ubuntu-latest

    steps:
      - name: Checkout del codigo
        uses: actions/checkout@v4

      - name: Configurar Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Configurar Java JDK 21
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '21'

      - name: Configurar Android SDK
        uses: android-actions/setup-android@v3
        with:
          packages: 'platform-tools platforms;android-34 build-tools;34.0.0'

      - name: Instalar dependencias del frontend
        working-directory: ./frontend
        run: yarn install --network-timeout 600000

      - name: Crear archivo .env de produccion
        working-directory: ./frontend
        run: |
          echo "REACT_APP_BACKEND_URL=${{ secrets.REACT_APP_BACKEND_URL || 'https://ludoteca-board.preview.emergentagent.com' }}" > .env

      - name: Compilar build de React
        working-directory: ./frontend
        env:
          CI: false
          GENERATE_SOURCEMAP: false
          NODE_OPTIONS: --max-old-space-size=4096
        run: yarn build

      - name: Sincronizar Capacitor con Android
        working-directory: ./frontend
        run: npx cap sync android

      - name: Dar permisos a gradlew
        working-directory: ./frontend/android
        run: chmod +x gradlew

      - name: Regenerar gradle-wrapper.jar si falta
        working-directory: ./frontend/android
        run: |
          if [ ! -s gradle/wrapper/gradle-wrapper.jar ]; then
            echo "gradle-wrapper.jar no presente, descargando..."
            GRADLE_VERSION=$(grep distributionUrl gradle/wrapper/gradle-wrapper.properties | sed -E 's/.*gradle-([0-9.]+).*/\1/')
            echo "Detectada gradle version: $GRADLE_VERSION"
            curl -sL "https://services.gradle.org/distributions/gradle-${GRADLE_VERSION}-bin.zip" -o /tmp/gradle.zip
            unzip -q /tmp/gradle.zip -d /tmp
            /tmp/gradle-${GRADLE_VERSION}/bin/gradle wrapper --gradle-version ${GRADLE_VERSION} --no-daemon
            rm -rf /tmp/gradle.zip /tmp/gradle-${GRADLE_VERSION}
          fi
          ls -lh gradle/wrapper/

      - name: Mostrar version de gradle (debug)
        working-directory: ./frontend/android
        run: ./gradlew --version --no-daemon

      - name: Compilar APK debug
        working-directory: ./frontend/android
        run: ./gradlew assembleDebug --stacktrace --no-daemon

      - name: Renombrar APK
        run: |
          mkdir -p apk-output
          cp frontend/android/app/build/outputs/apk/debug/app-debug.apk apk-output/mi-ludoteca.apk
          ls -lh apk-output/

      - name: Subir APK como artefacto descargable
        uses: actions/upload-artifact@v4
        with:
          name: mi-ludoteca-apk
          path: apk-output/mi-ludoteca.apk
          retention-days: 30
